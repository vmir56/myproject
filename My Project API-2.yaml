openapi: 3.0.3
info:
  title: My Project API
  version: 1.0.0
  description: Документация API для учебного проекта
paths:
  /api/books/:
    get:
      operationId: books_list
      description: Этот эндпоинт позволяет получить список всех книг в базе данных.
        Вы также можете добавить новую книгу с помощью POST-запроса.
      summary: Получение списка книг
      tags:
      - books
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
          description: ''
    post:
      operationId: books_create
      description: Этот эндпоинт позволяет получить список всех книг в базе данных.
        Вы также можете добавить новую книгу с помощью POST-запроса.
      summary: Получение списка книг
      tags:
      - books
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Book'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Book'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
          description: ''
  /api/books/{id}/:
    get:
      operationId: books_retrieve
      description: Позволяет получить информацию о книге, обновить её данные или удалить.
      summary: Работа с конкретной книгой
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - books
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: ''
        '204':
          description: No response body
    put:
      operationId: books_update
      description: Позволяет получить информацию о книге, обновить её данные или удалить.
      summary: Работа с конкретной книгой
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - books
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Book'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Book'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Book'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: ''
        '204':
          description: No response body
    patch:
      operationId: books_partial_update
      description: Позволяет получить информацию о книге, обновить её данные или удалить.
      summary: Работа с конкретной книгой
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - books
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBook'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBook'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBook'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: ''
        '204':
          description: No response body
    delete:
      operationId: books_destroy
      description: Позволяет получить информацию о книге, обновить её данные или удалить.
      summary: Работа с конкретной книгой
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - books
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
          description: ''
        '204':
          description: No response body
  /api/category/:
    get:
      operationId: category_list
      description: Этот эндпоинт позволяет получить список всех категорий книг в базе
        данных. Вы также можете добавить новую категорию с помощью POST-запроса.
      summary: Получение списка категорий книг
      tags:
      - category
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryDetail'
          description: ''
    post:
      operationId: category_create
      description: Этот эндпоинт позволяет получить список всех категорий книг в базе
        данных. Вы также можете добавить новую категорию с помощью POST-запроса.
      summary: Получение списка категорий книг
      tags:
      - category
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CategoryDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CategoryDetail'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryDetail'
          description: ''
  /api/category/{id}/:
    get:
      operationId: category_retrieve
      description: Позволяет получить информацию о категории книг, обновить её данные
        или удалить.
      summary: Работа с конкретной книгой
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - category
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetail'
          description: ''
        '204':
          description: No response body
    put:
      operationId: category_update
      description: Позволяет получить информацию о категории книг, обновить её данные
        или удалить.
      summary: Работа с конкретной книгой
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - category
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CategoryDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CategoryDetail'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetail'
          description: ''
        '204':
          description: No response body
    patch:
      operationId: category_partial_update
      description: Позволяет получить информацию о категории книг, обновить её данные
        или удалить.
      summary: Работа с конкретной книгой
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - category
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCategoryDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCategoryDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCategoryDetail'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetail'
          description: ''
        '204':
          description: No response body
    delete:
      operationId: category_destroy
      description: Позволяет получить информацию о категории книг, обновить её данные
        или удалить.
      summary: Работа с конкретной книгой
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - category
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetail'
          description: ''
        '204':
          description: No response body
  /api/category/{id}/detail:
    get:
      operationId: category_detail_retrieve
      description: Получение категории с вложенными данными (книги в категории).
      summary: Детальная категория с книгами
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - category
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetail'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
