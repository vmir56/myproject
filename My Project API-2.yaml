          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: Название книги
          description: Название книги
          maxLength: 255
        author:
          type: string
          title: Автор
          description: Автор книги
          maxLength: 255
        published_date:
          type: string
          format: date
          title: Дата публикации
          description: Дата публикации (формат YYYY-MM-DD)
        isbn:
          type: string
          description: Уникальный ISBN номер книги
          maxLength: 13
        page_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Количество страниц
          description: Количество страниц
        cover:
          type: string
          format: uri
          title: Обложка книги (URL)
          description: Ссылка на изображение обложки
          maxLength: 200
        category:
          type: integer
          nullable: true
          title: Категория
      required:
      - author
      - id
      - isbn
      - page_count
      - published_date
      - title
    CategoryDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        books:
          type: array
          items:
            $ref: '#/components/schemas/Book'
          readOnly: true
        title:
          type: string
          title: Название категории
          description: Название категории
          maxLength: 255
        description:
          type: string
          title: Описание категории
          description: Описание категории
      required:
      - books
      - id
      - title
    PatchedBook:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: Название книги
          description: Название книги
          maxLength: 255
        author:
          type: string
          title: Автор
          description: Автор книги
          maxLength: 255
        published_date:
          type: string
          format: date
          title: Дата публикации
          description: Дата публикации (формат YYYY-MM-DD)
        isbn:
          type: string
          description: Уникальный ISBN номер книги
          maxLength: 13
        page_count:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Количество страниц
          description: Количество страниц
        cover:
          type: string
          format: uri
          title: Обложка книги (URL)
          description: Ссылка на изображение обложки
          maxLength: 200
        category:
          type: integer
          nullable: true
          title: Категория
    PatchedCategoryDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        books:
          type: array
          items:
            $ref: '#/components/schemas/Book'
          readOnly: true
        title:
          type: string
          title: Название категории
          description: Название категории
          maxLength: 255
        description:
          type: string
          title: Описание категории
          description: Описание категории
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
